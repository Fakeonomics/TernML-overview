<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" font-family="Consolas,monospace">
  <rect width="800" height="500" fill="#1e1e1e" rx="8"/>

  <!-- Title -->
  <text x="400" y="36" text-anchor="middle" fill="#aaa" font-size="14">5 architectures → Cortex-M0+</text>

  <!-- Architecture boxes -->
  <g>
    <rect x="30" y="60" width="200" height="60" rx="6" fill="#2d2d2d" stroke="#569cd6" stroke-width="1.5"/>
    <text x="130" y="88" text-anchor="middle" fill="#569cd6" font-size="14" font-weight="bold">GraphKAN</text>
    <text x="130" y="108" text-anchor="middle" fill="#888" font-size="11">96% MNIST / 15 KB</text>
  </g>
  <g>
    <rect x="30" y="140" width="200" height="60" rx="6" fill="#2d2d2d" stroke="#4ec9b0" stroke-width="1.5"/>
    <text x="130" y="168" text-anchor="middle" fill="#4ec9b0" font-size="14" font-weight="bold">CNN</text>
    <text x="130" y="188" text-anchor="middle" fill="#888" font-size="11">92% Fashion-MNIST / 100 KB</text>
  </g>
  <g>
    <rect x="30" y="220" width="200" height="60" rx="6" fill="#2d2d2d" stroke="#dcdcaa" stroke-width="1.5"/>
    <text x="130" y="248" text-anchor="middle" fill="#dcdcaa" font-size="14" font-weight="bold">Transformer</text>
    <text x="130" y="268" text-anchor="middle" fill="#888" font-size="11">Copy task / 20 KB</text>
  </g>
  <g>
    <rect x="30" y="300" width="200" height="60" rx="6" fill="#2d2d2d" stroke="#c586c0" stroke-width="1.5"/>
    <text x="130" y="328" text-anchor="middle" fill="#c586c0" font-size="14" font-weight="bold">RNN / LSTM</text>
    <text x="130" y="348" text-anchor="middle" fill="#888" font-size="11">Seq MNIST / 5-17 KB</text>
  </g>
  <g>
    <rect x="30" y="380" width="200" height="60" rx="6" fill="#2d2d2d" stroke="#ce9178" stroke-width="1.5"/>
    <text x="130" y="408" text-anchor="middle" fill="#ce9178" font-size="14" font-weight="bold">ViT</text>
    <text x="130" y="428" text-anchor="middle" fill="#888" font-size="11">65% CIFAR-10 / 43 KB</text>
  </g>

  <!-- Arrows -->
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M0,0 L10,5 L0,10" fill="#569cd6"/>
    </marker>
  </defs>
  <line x1="230" y1="90" x2="370" y2="250" stroke="#555" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="230" y1="170" x2="370" y2="255" stroke="#555" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="230" y1="250" x2="370" y2="260" stroke="#555" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="230" y1="330" x2="370" y2="265" stroke="#555" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="230" y1="410" x2="370" y2="270" stroke="#555" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Compile step -->
  <rect x="340" y="230" width="130" height="55" rx="20" fill="#333" stroke="#e6db74" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="405" y="254" text-anchor="middle" fill="#e6db74" font-size="11">arm-none-eabi-gcc</text>
  <text x="405" y="272" text-anchor="middle" fill="#888" font-size="10">-O2 -fno-builtin</text>

  <!-- MCU box -->
  <rect x="530" y="210" width="240" height="100" rx="8" fill="#1a3a1a" stroke="#4ec9b0" stroke-width="2"/>
  <text x="650" y="240" text-anchor="middle" fill="#4ec9b0" font-size="16" font-weight="bold">Cortex-M0+</text>
  <text x="650" y="260" text-anchor="middle" fill="#aaa" font-size="11">STM32G0 / 15 руб</text>
  <text x="650" y="278" text-anchor="middle" fill="#888" font-size="11">~73-138M инструкций</text>
  <text x="650" y="296" text-anchor="middle" fill="#888" font-size="11">без FPU, без DSP</text>

  <!-- Unicorn box -->
  <rect x="530" y="340" width="240" height="50" rx="6" fill="#2d2d2d" stroke="#888" stroke-width="1"/>
  <text x="650" y="362" text-anchor="middle" fill="#888" font-size="11">Верификация: Unicorn Engine</text>
  <text x="650" y="378" text-anchor="middle" fill="#666" font-size="10">73M–138M инструкций симуляции</text>
  <line x1="650" y1="310" x2="650" y2="340" stroke="#555" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- Bottom text -->
  <text x="400" y="470" text-anchor="middle" fill="#555" font-size="12">TernML — Multi-Architecture Ternary ML Framework</text>
  <text x="400" y="490" text-anchor="middle" fill="#444" font-size="10">fakeonomics.github.io/TernML-overview</text>
</svg>
